<style>
:root {
  --bg:#161820;--surface:#1e2029;--surface2:#272a36;--surface3:#2f3344;
  --border:#383d52;--accent:#e8a23a;--accent2:#4a9ef0;--ok:#3ac87a;
  --danger:#e8503a;--text:#eaecf4;--text2:#b0b8cc;--muted:#6a7490;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;--radius:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 14px 60px;}
header{width:100%;max-width:700px;display:flex;align-items:center;gap:14px;margin-bottom:24px;}
.logo{width:44px;height:44px;background:linear-gradient(135deg,#c87c20,#e8a23a);
  border-radius:11px;display:grid;place-items:center;font-size:22px;flex-shrink:0;
  box-shadow:0 2px 10px rgba(232,162,58,.25);}
.header-text h1{font-size:1.15rem;font-weight:700;letter-spacing:-.01em;}
.header-text p{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}

/* norm pills */
.norm-pills{width:100%;max-width:700px;display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px;}
.npill{font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:20px;
  letter-spacing:.05em;border:1px solid;}
.np-18531{background:rgba(58,200,122,.1);color:#4ed68a;border-color:rgba(58,200,122,.3);}
.np-18532{background:rgba(232,162,58,.1);color:#f0b450;border-color:rgba(232,162,58,.3);}
.np-18533{background:rgba(74,158,240,.1);color:#70b8ff;border-color:rgba(74,158,240,.3);}
.np-18534{background:rgba(180,100,240,.1);color:#c080ff;border-color:rgba(180,100,240,.3);}
.np-18535{background:rgba(232,80,58,.1);color:#f06050;border-color:rgba(232,80,58,.3);}

.progress-wrap{width:100%;max-width:700px;margin-bottom:14px;}
.progress-track{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .35s cubic-bezier(.4,0,.2,1);}

// KEY BUILDER
// ═══════════════════════════════════════════════════════════════════════════════
function buildKey(){
  var b=answers.bereich||"";
  if(b==="dach"){
    return "dach|"+(answers.dachtyp||"")+("|")+(answers.dachsys||"");
  }
  if(b==="fahren"){
    return "fahren|"+(answers.sys18532||"");
  }
  if(b==="erde"){
    var eb=answers.erdbaut||"";
    if(eb==="wand"||eb==="sohle") return "erde|"+eb+"|"+(answers.wasser||"");
    if(eb==="sockel")             return "erde|sockel|"+(answers.sockel||"");
    if(eb==="durchdringung")      return "erde|durchdringung|"+(answers.dg||"");
  }
  if(b==="innen"){
    return "innen|"+(answers.bkl||"")+("|")+(answers.innensys||"");
  }
  if(b==="behaelter"){
    return "behaelter|"+(answers.beh||"")+("|")+(answers.behsys||"");
  }
  return "";
}

// NAVIGATION
// ═══════════════════════════════════════════════════════════════════════════════
function chooseOption(idx){
  var step=TREE[currentStep], opt=step.options[idx];
  if(opt.key&&opt.ans!==undefined&&opt.ans!==null) answers[opt.key]=opt.ans;
  navStack.push({stepKey:currentStep,answers:JSON.parse(JSON.stringify(answers)),crumb:opt.label});
  currentStep=opt.next;
  render();
}
function goBack(){
  if(navStack.length===0) return;
  var prev=navStack.pop();
  currentStep=prev.stepKey; answers=prev.answers;
  render();
}
function resetAll(){navStack=[];answers={};currentStep="start";render();}
function toggleCheck(i){
  var box=document.getElementById("cb"+i),lbl=document.getElementById("cl"+i);
  var on=box.classList.toggle("checked");
  if(on)lbl.classList.add("checked");else lbl.classList.remove("checked");
}
function toggleStlb(){
  var b=document.getElementById("stlbBody"),t=document.getElementById("stlbToggle");
  var open=b.style.display!=="none";
  b.style.display=open?"none":"block";
  t.textContent=open?"▼ Anzeigen":"▲ Ausblenden";
}
function togglePos(i){
  var d=document.getElementById("sd"+i),a=document.getElementById("sa"+i);
  var open=d.classList.contains("open");
  d.classList.toggle("open",!open); a.classList.toggle("open",!open);
}
function copyText(i){
  var ta=document.getElementById("st"+i),btn=document.getElementById("cb2_"+i);
  var txt=ta.textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(function(){
      btn.textContent="✓ Kopiert!";btn.classList.add("copied");
      setTimeout(function(){btn.textContent="📋 Text kopieren";btn.classList.remove("copied");},2000);
    });
  }else{
    var r=document.createRange();r.selectNodeContents(ta);
    var s=window.getSelection();s.removeAllRanges();s.addRange(r);
    document.execCommand("copy");s.removeAllRanges();
    btn.textContent="✓ Kopiert!";btn.classList.add("copied");
    setTimeout(function(){btn.textContent="📋 Text kopieren";btn.classList.remove("copied");},2000);
  }
}

// RENDER
// ═══════════════════════════════════════════════════════════════════════════════
function setProgress(pct,label){
  document.getElementById("progressFill").style.width=pct+"%";
  document.getElementById("progressLabel").textContent=label;
  document.getElementById("progressPct").textContent=pct+" %";
}
function renderBreadcrumb(){
  var out="";
  for(var i=0;i<navStack.length;i++){
    out+='<span class="crumb">'+navStack[i].crumb+'</span>';
    if(i<navStack.length-1)out+='<span class="crumb-arrow">›</span>';
  }
  document.getElementById("breadcrumb").innerHTML=out;
}
function render(){
  renderBreadcrumb();
  if(currentStep==="result"){renderResult();return;}
  var step=TREE[currentStep];
  if(!step){
    document.getElementById("app").innerHTML='<div class="card"><p style="color:var(--muted)">Unbekannter Schritt: '+currentStep+'</p><div class="back-row"><button class="back-btn" onclick="resetAll()">Neu starten</button></div></div>';
    return;
  }
  setProgress(step.progress,step.step);
  var opts="";
  for(var i=0;i<step.options.length;i++){
    var o=step.options[i];
    var normBadge=o.norm?'<span class="opt-norm '+o.norm+'">'+o.normtxt+'</span>':"";
    opts+='<button class="opt-btn" onclick="chooseOption('+i+')">'+
      '<span class="opt-icon">'+o.icon+'</span>'+
      '<span class="opt-text"><span class="opt-label">'+o.label+'</span>'+
      (o.desc?'<span class="opt-desc">'+o.desc+'</span>':'')+
      normBadge+'</span></button>';
  }
  var back=navStack.length>0?'<div class="back-row"><button class="back-btn" onclick="goBack()">← Zurück</button></div>':"";
  document.getElementById("app").innerHTML=
    '<div class="card">'+
      '<div class="step-chip"><span class="step-dot"></span>'+step.step+'</div>'+
      '<div class="question">'+step.question+'</div>'+
      (step.hint?'<div class="hint">'+step.hint+'</div>':'<div style="margin-bottom:16px"></div>')+
      '<div class="options">'+opts+'</div>'+back+
    '</div>';
}

function renderResult(){
  setProgress(100,"Ergebnis");
  var key=buildKey();
  var r=RESULTS[key];
  if(!r){
    document.getElementById("app").innerHTML=
      '<div class="card"><p style="color:var(--muted)">Kombination nicht erkannt.<br><small>Key: '+key+'</small></p>'+
      '<div class="back-row"><button class="back-btn" onclick="goBack()">← Zurück</button>&nbsp;<button class="back-btn" onclick="resetAll()">Neu starten</button></div></div>';
    return;
  }
  var warns="";
  for(var i=0;i<r.warnungen.length;i++)
    warns+='<div class="warn-box"><span>⚠️</span><span>'+r.warnungen[i]+'</span></div>';
  if(warns)warns='<div class="warn-list">'+warns+'</div>';

  var sys="";
  for(var i=0;i<r.systeme.length;i++){
    var s=r.systeme[i];
    sys+='<div class="sys-item '+(s.prim?"prim":"alt")+'">'+
      '<span class="sys-tag">'+(s.prim?"Empfohlen":"Alternativ")+'</span>'+
      '<div><div class="sys-name">'+s.name+'</div><div class="sys-note">'+s.note+'</div></div></div>';
  }
  var chk="";
  for(var i=0;i<r.checks.length;i++)
    chk+='<div class="check-item">'+
      '<div class="check-box" id="cb'+i+'" onclick="toggleCheck('+i+')"></div>'+

  var stlbPos=STLB[key]||[];
  var stlbHtml="";
  if(stlbPos.length>0){
    var posHtml="";
    for(var i=0;i<stlbPos.length;i++){
      var p=stlbPos[i];
      posHtml+='<div class="stlb-pos">'+
        '<div class="stlb-pos-head" onclick="togglePos('+i+')">'+

          '<span class="stlb-arrow" id="sa'+i+'">›</span>'+
        '</div>'+
        '<div class="stlb-detail" id="sd'+i+'">'+
          '<pre class="stlb-langtext" id="st'+i+'">'+p.lang+'</pre>'+
          '<button class="copy-btn" id="cb2_'+i+'" onclick="copyText('+i+')">📋 Text kopieren</button>'+
        '</div></div>';
    }
    stlbHtml='<div class="stlb-block">'+
      '<div class="stlb-head" onclick="toggleStlb()">'+
        '<div style="display:flex;align-items:center;gap:8px"><span>📄 Ausschreibungstext</span>'+
        '<span class="stlb-badge">StLB-Bau orientiert</span></div>'+
        '<span class="stlb-toggle" id="stlbToggle">▼ Anzeigen</span>'+
      '</div>'+
      '<div id="stlbBody" style="display:none">'+posHtml+'</div></div>';
  }

  document.getElementById("app").innerHTML=
    '<div class="result-wrap">'+
      '<div class="result-hero">'+
        '<div class="badge '+r.badge+'">'+r.klasse+'</div>'+
        '<div class="result-title">'+r.title+'</div>'+
        '<div class="result-subtitle">'+r.subtitle+'</div>'+
      '</div>'+
      warns+
      '<div class="section-block"><div class="section-head">Abdichtungssystem</div>'+
        '<div class="section-body">'+sys+'</div></div>'+

        '<div class="section-body check-list">'+chk+'</div>'+
        '<div class="norm-row"><span>📖</span>'+r.norm+'</div></div>'+
      stlbHtml+
      renderLitBlock(key)+
      renderDetailBlock(key)+
      '<div class="result-footer">'+
        '<button class="back-btn" onclick="goBack()">← Zurück</button>'+
        '<button class="action-btn primary-btn" onclick="resetAll()">↩ Neue Abfrage</button>'+
      '</div>'+
    '</div>';
}

// ── SVG helper ──────────────────────────────────────────────────────────────
function svgOpen(w,h){
  return '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:320px">';
}
function svgClose(){ return '</svg>'; }
function rect(x,y,w,h,fill,stroke,sw){
  return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'"'+(stroke?' stroke="'+stroke+'" stroke-width="'+(sw||1)+'"':'')+'/>';
}
function line(x1,y1,x2,y2,col,w,dash){
  return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+col+'" stroke-width="'+(w||1)+'"'+(dash?' stroke-dasharray="'+dash+'"':'')+'/>';
}
function text(x,y,txt,col,size,anchor,bold){
  return '<text x="'+x+'" y="'+y+'" fill="'+col+'" font-size="'+(size||10)+'" text-anchor="'+(anchor||'start')+'" font-family="Segoe UI,system-ui" '+(bold?'font-weight="700"':'')+'>'+txt+'</text>';
}
function poly(pts,fill,stroke,sw){
  return '<polygon points="'+pts+'" fill="'+fill+'"'+(stroke?' stroke="'+stroke+'" stroke-width="'+(sw||1)+'"':'')+'/>';
}
function path(d,fill,stroke,sw){
  return '<path d="'+d+'" fill="'+fill+'"'+(stroke?' stroke="'+stroke+'" stroke-width="'+(sw||1)+'"':'')+'/>';
}
function arrow(x1,y1,x2,y2,col){
  var a='<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+col+'" stroke-width="1" marker-end="url(#arr)"/>';
  return a;
}
function arrowDef(col){
  return '<defs><marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="'+(col||C.accent)+'"/></marker></defs>';
}
function dimLine(x1,y1,x2,y2,label,col){
  col=col||C.accent;
  var s='';
  s+=line(x1,y1,x2,y2,col,1,'4,2');
  var mx=(x1+x2)/2, my=(y1+y2)/2;
  s+=text(mx,my-3,label,col,8,'middle');
  return s;
}
function hatch(x,y,w,h,col){ // diagonal hatch for earth/Erdreich
  var s='<g clip-path="url(#hc'+x+y+')">';
  s+='<clipPath id="hc'+x+y+'"><rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'"/></clipPath>';
  for(var i=-h;i<w+h;i+=8){
    s+=line(x+i,y,x+i+h,y+h,col,0.7);
  }
  s+='</g>';
  return s;
}

// ── Technische Zeichnungs-Helfer ──────────────────────────────────────────
function TZ() {}

// Maßkette mit Pfeilen und Hilfslinie
TZ.mass = function(x1,y1,x2,y2, label, off, col) {
  col = col || "#3ac87a";
  off = off || 0;
  var dx = x2-x1, dy = y2-y1;
  var len = Math.sqrt(dx*dx+dy*dy);
  var nx = -dy/len, ny = dx/len; // normal
  var mx = (x1+x2)/2 + nx*off*0.3;
  var my = (y1+y2)/2 + ny*off*0.3;
  var lx1 = x1+nx*off, ly1 = y1+ny*off;
  var lx2 = x2+nx*off, ly2 = y2+ny*off;
  var s = '';
  // Hilfslinien
  s += '<line x1="'+x1+'" y1="'+y1+'" x2="'+lx1+'" y2="'+ly1+'" stroke="'+col+'" stroke-width="0.6" stroke-dasharray="3,2"/>';
  s += '<line x1="'+x2+'" y1="'+y2+'" x2="'+lx2+'" y2="'+ly2+'" stroke="'+col+'" stroke-width="0.6" stroke-dasharray="3,2"/>';
  // Maßlinie
  s += '<line x1="'+lx1+'" y1="'+ly1+'" x2="'+lx2+'" y2="'+ly2+'" stroke="'+col+'" stroke-width="1" marker-start="url(#mArr)" marker-end="url(#mArrR)"/>';
  // Label
  var angle = Math.atan2(dy,dx)*180/Math.PI;
  var loff = nx*(off+12);
  s += '<text x="'+(mx+loff)+'" y="'+(my+ny*(off+12))+'" fill="'+col+'" font-size="8" text-anchor="middle" font-family="Courier New,monospace">'+label+'</text>';
  return s;
};

// Hinweislinie (Leader)
TZ.leader = function(x1,y1,x2,y2,x3,y3,label,col,size) {
  col = col||"#eaecf4"; size=size||8;
  var s = '<polyline points="'+x1+','+y1+' '+x2+','+y2+' '+x3+','+y3+'" fill="none" stroke="'+col+'" stroke-width="0.8" marker-start="url(#arrA)"/>';
  s += '<text x="'+(x3+2)+'" y="'+(y3+3)+'" fill="'+col+'" font-size="'+size+'" font-family="Segoe UI,system-ui">'+label+'</text>';
  return s;
};

// Schriftfeld Positionsnummer (Kreis mit Zahl)
TZ.posnr = function(x,y,nr,col) {
  col=col||"#e8a23a";
  return '<circle cx="'+x+'" cy="'+y+'" r="8" fill="none" stroke="'+col+'" stroke-width="1"/>'+
    '<text x="'+x+'" y="'+(y+3)+'" fill="'+col+'" font-size="8" text-anchor="middle" font-family="Courier New,monospace" font-weight="bold">'+nr+'</text>';
};

// Zeichnungsrahmen
TZ.rahmen = function(w,h,titel,norm) {
  return '<rect x="1" y="1" width="'+(w-2)+'" height="'+(h-2)+'" fill="none" stroke="#383d52" stroke-width="1.5"/>'+
    '<line x1="1" y1="'+(h-18)+'" x2="'+(w-1)+'" y2="'+(h-18)+'" stroke="#383d52" stroke-width="0.8"/>'+
    '<text x="6" y="'+(h-8)+'" fill="#6a7490" font-size="7" font-family="Courier New,monospace">'+norm+'</text>'+
    '<text x="'+(w/2)+'" y="'+(h-8)+'" fill="#e8a23a" font-size="7.5" text-anchor="middle" font-family="Segoe UI,system-ui" font-weight="700">'+titel+'</text>'+
    '<text x="'+(w-4)+'" y="'+(h-8)+'" fill="#6a7490" font-size="6.5" text-anchor="end" font-family="Courier New,monospace">M 1:10</text>';
};

// Schnittlinie (A-A)
TZ.schnittlinie = function(x1,y1,x2,y2,label) {
  return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#e8a23a" stroke-width="1" stroke-dasharray="8,3,1,3"/>'+
    '<text x="'+(x1-8)+'" y="'+(y1+3)+'" fill="#e8a23a" font-size="8" font-weight="bold" font-family="Courier New,monospace">'+label+'</text>'+
    '<text x="'+(x2+2)+'" y="'+(y2+3)+'" fill="#e8a23a" font-size="8" font-weight="bold" font-family="Courier New,monospace">'+label+'</text>';
};

function svgWrap(w,h,content) {
  return '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" '+
    'style="width:100%;max-height:360px;background:#12141a;border-radius:8px">'+
    svgDefs()+content+'</svg>';
}

function renderDetailBlock(resultKey) {
  var keys = getDetailKeys(resultKey);
  if (!keys.length) return "";

  var tabButtons = "";
  for (var i=0; i<keys.length; i++) {
    var d = DETAILS[keys[i]];
    if (!d) continue;
    tabButtons += '<button class="detail-tab'+(i===0?' active':'')+
      '" id="dtab_'+i+'" onclick="switchDetail(\''+resultKey+'\','+i+','+keys.length+')">'
      +d.titel+'</button>';
  }

  var html = '<div class="detail-block" id="detailBlock">'+
    '<div class="detail-head" onclick="toggleDetail()">'+
      '<div style="display:flex;align-items:center;gap:8px">'+
        '<span>📐 Regeldetails</span>'+
        '<span class="detail-badge">SVG-Schnittzeichnungen</span>'+
      '</div>'+
      '<span class="detail-toggle" id="detailToggle">▼ Anzeigen</span>'+
    '</div>'+
    '<div id="detailBody" style="display:none">'+
      '<div class="detail-tabs">'+tabButtons+'</div>'+
      '<div id="detailContent"></div>'+
    '</div>'+
  '</div>';
  return html;
}

function toggleDetail() {
  var b = document.getElementById("detailBody");
  var t = document.getElementById("detailToggle");
  var open = b.style.display !== "none";
  b.style.display = open ? "none" : "block";
  t.textContent = open ? "▼ Anzeigen" : "▲ Ausblenden";
  if (!open) {
    // Render first detail
    var key = buildKey();
    var keys = getDetailKeys(key);
    if (keys.length) renderDetailContent(keys[0], 0, keys);
  }
}

function switchDetail(resultKey, idx, total) {
  for (var i=0; i<total; i++) {
    var tab = document.getElementById("dtab_"+i);
    if (tab) tab.classList.toggle("active", i===idx);
  }
  var keys = getDetailKeys(resultKey);
  renderDetailContent(keys[idx], 0, keys);
}

function switchSubTab(detailKey, tabIdx, total) {
  for (var i=0; i<total; i++) {
    var t = document.getElementById("stab_"+i);
    if (t) t.classList.toggle("active", i===tabIdx);
  }
  var d = DETAILS[detailKey];
  renderSVG(detailKey, tabIdx);
}

function renderDetailContent(detailKey, subTab, allKeys) {
  var d = DETAILS[detailKey];
  if (!d) return;
  var content = document.getElementById("detailContent");
  if (!content) return;

  var subTabs = "";
  if (d.tabs && d.tabs.length > 1) {
    for (var i=0; i<d.tabs.length; i++) {
      subTabs += '<button class="detail-tab'+(i===0?' active':'')+
        '" id="stab_'+i+'" onclick="switchSubTab(\''+detailKey+'\','+i+','+d.tabs.length+')">'
        +d.tabs[i]+'</button>';
    }
    subTabs = '<div class="detail-tabs" style="background:var(--surface3)">'+subTabs+'</div>';
  }

  var svgHtml = d.svg && d.svg[0] ? d.svg[0]() : "";
  var legendHtml = '<div class="detail-legend">';
  for (var i=0; i<(d.legend||[]).length; i++) {
    var l = d.legend[i];
    legendHtml += '<div class="legend-row">'+
      '<div class="legend-dot" style="background:'+l.col+'"></div>'+
      '<span>'+l.label+'</span></div>';
  }
  legendHtml += '</div>';

  content.innerHTML =
    subTabs +
    '<div class="detail-content">'+
      '<div class="detail-svg-wrap" id="svgWrap">'+svgHtml+'</div>'+
      legendHtml+
      (d.maße ? '<div class="detail-maße">📏 '+d.maße.replace(/\n/g,'<br>')+'</div>' : '')+
      '<div style="font-size:.7rem;color:var(--muted);margin-top:8px">📖 '+d.norm+'</div>'+
    '</div>';
}

function renderSVG(detailKey, tabIdx) {
  var d = DETAILS[detailKey];
  var wrap = document.getElementById("svgWrap");
  if (d && d.svg && d.svg[tabIdx] && wrap) {
    wrap.innerHTML = d.svg[tabIdx]();
  }
}

// ── Literatur-Rendering ────────────────────────────────────────────────────
function getLitData(resultKey) {
  return LIT[resultKey] || null;
}

function renderLitBlock(resultKey) {
  var data = getLitData(resultKey);
  if (!data) return "";

  var hasContent = (data.normen && data.normen.length) ||
                   (data.dbv   && data.dbv.length)    ||
                   (data.fach  && data.fach.length);
  if (!hasContent) return "";

  function renderItems(items, cls, icon) {
    if (!items || !items.length) return "";
    var s = "";
    for (var i=0; i<items.length; i++) {
      var it = items[i];
      s += '<div class="lit-item '+cls+'">'+
        '<div class="lit-icon">'+icon+'</div>'+
        '<div class="lit-content">'+
          '<div class="lit-name">'+it.name+'</div>'+
          '<div class="lit-detail">'+it.detail+'</div>'+
          '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px">'+
            '<span class="lit-tag kapitel">📖 '+it.kapitel+'</span>'+
            '<span class="lit-tag bezug">→ '+it.bezug+'</span>'+
          '</div>'+
        '</div>'+
      '</div>';
    }
    return s;
  }

  var normHtml = renderItems(data.normen, "norm", "📐");
  var dbvHtml  = renderItems(data.dbv,    "dbv",  "📘");
  var fachHtml = renderItems(data.fach,   "fach", "📗");

  var body = '<div class="lit-body">';
  if (normHtml) body += '<div class="lit-section"><div class="lit-section-title">Normen</div>'+normHtml+'</div>';
  if (dbvHtml)  body += '<div class="lit-section"><div class="lit-section-title">DBV-Merkblätter</div>'+dbvHtml+'</div>';
  if (fachHtml) body += '<div class="lit-section"><div class="lit-section-title">Fachliteratur & Regelwerke</div>'+fachHtml+'</div>';
  body += '</div>';

  return '<div class="lit-block">'+
    '<div class="lit-head" onclick="toggleLit()">'+
      '<div style="display:flex;align-items:center;gap:8px">'+
        '<span>📚 Normen & Literatur</span>'+
        '<span class="lit-badge">DBV · DIN · Fachregeln</span>'+
      '</div>'+
      '<span class="lit-toggle" id="litToggle">▼ Anzeigen</span>'+
    '</div>'+
    '<div id="litBody" style="display:none">'+body+'</div>'+
  '</div>';
}

function toggleLit() {
  var b = document.getElementById("litBody");
  var t = document.getElementById("litToggle");
  if (!b) return;
  var open = b.style.display !== "none";
  b.style.display = open ? "none" : "block";
  t.textContent = open ? "▼ Anzeigen" : "▲ Ausblenden";
}

render();
</script>
