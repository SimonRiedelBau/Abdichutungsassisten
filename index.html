<style>
:root {
  --bg:#161820;--surface:#1e2029;--surface2:#272a36;--surface3:#2f3344;
  --border:#383d52;--accent:#e8a23a;--accent2:#4a9ef0;--ok:#3ac87a;
  --danger:#e8503a;--text:#eaecf4;--text2:#b0b8cc;--muted:#6a7490;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;--radius:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 14px 60px;}
header{width:100%;max-width:700px;display:flex;align-items:center;gap:14px;margin-bottom:24px;}
.logo{width:44px;height:44px;background:linear-gradient(135deg,#c87c20,#e8a23a);
  border-radius:11px;display:grid;place-items:center;font-size:22px;flex-shrink:0;
  box-shadow:0 2px 10px rgba(232,162,58,.25);}
.header-text h1{font-size:1.15rem;font-weight:700;letter-spacing:-.01em;}
.header-text p{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px;}

/* norm pills */
.norm-pills{width:100%;max-width:700px;display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px;}
.npill{font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:20px;
  letter-spacing:.05em;border:1px solid;}
.np-18531{background:rgba(58,200,122,.1);color:#4ed68a;border-color:rgba(58,200,122,.3);}
.np-18532{background:rgba(232,162,58,.1);color:#f0b450;border-color:rgba(232,162,58,.3);}
.np-18533{background:rgba(74,158,240,.1);color:#70b8ff;border-color:rgba(74,158,240,.3);}
.np-18534{background:rgba(180,100,240,.1);color:#c080ff;border-color:rgba(180,100,240,.3);}
.np-18535{background:rgba(232,80,58,.1);color:#f06050;border-color:rgba(232,80,58,.3);}

.progress-wrap{width:100%;max-width:700px;margin-bottom:14px;}
.progress-track{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .35s cubic-bezier(.4,0,.2,1);}
.progress-label{font-size:.7rem;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between;}

.crumb-arrow{color:var(--border);font-size:.7rem;}

.card{width:100%;max-width:700px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:26px 24px 22px;animation:slideUp .22s ease;}

.step-chip{display:inline-flex;align-items:center;gap:5px;font-size:.68rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:12px;}
.step-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;}
.question{font-size:1.1rem;font-weight:600;line-height:1.45;margin-bottom:6px;}
.hint{font-size:.82rem;color:var(--text2);line-height:1.55;margin-bottom:20px;}

.options{display:flex;flex-direction:column;gap:8px;}
.opt-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;
  padding:13px 16px;cursor:pointer;text-align:left;color:var(--text);font-family:var(--font);
  font-size:.9rem;transition:border-color .15s,background .15s,transform .12s;
  display:flex;align-items:center;gap:13px;width:100%;}
.opt-btn:hover{border-color:var(--accent);background:var(--surface3);transform:translateX(3px);}
.opt-icon{font-size:1.2rem;width:30px;text-align:center;flex-shrink:0;}
.opt-label{font-weight:600;font-size:.9rem;display:block;}
.opt-desc{font-size:.76rem;color:var(--muted);display:block;margin-top:2px;line-height:1.4;}
.opt-norm{font-size:.65rem;font-weight:700;margin-top:4px;display:inline-block;
  padding:1px 7px;border-radius:10px;letter-spacing:.04em;}

.back-row{margin-top:18px;padding-top:16px;border-top:1px solid var(--border);}
.back-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 14px;
  color:var(--muted);font-family:var(--font);font-size:.8rem;cursor:pointer;transition:color .15s,border-color .15s;}
.back-btn:hover{color:var(--text);border-color:var(--text2);}

/* result */
.result-wrap{width:100%;max-width:700px;display:flex;flex-direction:column;gap:12px;animation:slideUp .25s ease;}
.result-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px 20px;}
.badge{display:inline-block;padding:3px 11px;border-radius:20px;font-size:.7rem;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;}
.badge-low {background:rgba(58,200,122,.12);color:#4ed68a;border:1px solid rgba(58,200,122,.28);}
.badge-mid {background:rgba(232,162,58,.12);color:#f0b450;border:1px solid rgba(232,162,58,.28);}
.badge-high{background:rgba(232,80,58,.12); color:#f06050;border:1px solid rgba(232,80,58,.28);}
.result-title{font-size:1.2rem;font-weight:700;line-height:1.35;}
.result-subtitle{font-size:.82rem;color:var(--text2);margin-top:5px;line-height:1.5;}

.warn-list{display:flex;flex-direction:column;gap:8px;}
.warn-box{display:flex;gap:10px;align-items:flex-start;background:rgba(232,80,58,.08);
  border:1px solid rgba(232,80,58,.22);border-radius:9px;padding:11px 14px;font-size:.83rem;color:#f0a090;line-height:1.5;}

.section-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.section-head{padding:12px 18px;border-bottom:1px solid var(--border);font-size:.68rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;color:var(--muted);background:var(--surface2);}
.section-body{padding:14px 18px;display:flex;flex-direction:column;gap:8px;}

.sys-item{display:flex;gap:12px;align-items:flex-start;padding:12px 14px;
  background:var(--surface2);border-radius:9px;border-left:3px solid var(--border);}
.sys-item.prim{border-left-color:var(--ok);}
.sys-item.alt {border-left-color:var(--accent2);}
.sys-tag{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.sys-item.prim .sys-tag{background:rgba(58,200,122,.14);color:#4ed68a;}
.sys-item.alt  .sys-tag{background:rgba(74,158,240,.14);color:#70b8ff;}
.sys-name{font-weight:600;font-size:.88rem;}
.sys-note{font-size:.76rem;color:var(--muted);margin-top:2px;line-height:1.4;}

.check-list{display:flex;flex-direction:column;gap:7px;}
.check-item{display:flex;align-items:flex-start;gap:10px;font-size:.85rem;color:var(--text2);line-height:1.45;}
.check-box{width:16px;height:16px;border:1.5px solid var(--border);border-radius:4px;flex-shrink:0;
  margin-top:2px;background:var(--surface3);cursor:pointer;transition:background .15s;display:grid;place-items:center;}
.check-box.checked{background:var(--ok);border-color:var(--ok);}
.check-box.checked::after{content:"✓";color:#0a2018;font-size:10px;font-weight:900;}
.check-label{cursor:pointer;}
.check-label.checked{color:var(--muted);text-decoration:line-through;}
.norm-row{display:flex;align-items:center;gap:8px;font-size:.74rem;color:var(--muted);
  padding:10px 18px;border-top:1px solid var(--border);background:var(--surface2);}

/* StLB */
.stlb-block{background:var(--surface);border:1px solid rgba(74,158,240,.35);border-radius:var(--radius);overflow:hidden;}
.stlb-head{padding:12px 18px;border-bottom:1px solid rgba(74,158,240,.2);font-size:.68rem;font-weight:700;

.stlb-badge{background:rgba(74,158,240,.18);color:#70b8ff;border:1px solid rgba(74,158,240,.3);

.stlb-toggle{font-size:.75rem;color:var(--muted);}
.stlb-pos{border-bottom:1px solid var(--border);}
.stlb-pos:last-child{border-bottom:none;}
.stlb-pos-head{display:flex;align-items:flex-start;gap:12px;padding:13px 18px;cursor:pointer;transition:background .15s;}
.stlb-pos-head:hover{background:var(--surface2);}
.stlb-nr{font-size:.7rem;font-weight:700;color:var(--accent2);background:rgba(74,158,240,.1);

.stlb-kurz{font-weight:600;font-size:.88rem;flex:1;line-height:1.4;}
.stlb-arrow{color:var(--muted);font-size:.75rem;flex-shrink:0;margin-top:3px;transition:transform .2s;}
.stlb-arrow.open{transform:rotate(90deg);}
.stlb-detail{display:none;padding:0 18px 16px;border-top:1px dashed var(--border);background:rgba(74,158,240,.03);}
.stlb-detail.open{display:block;}
.stlb-langtext{font-size:.78rem;color:var(--text2);line-height:1.65;white-space:pre-wrap;margin-top:12px;
  font-family:'Courier New',monospace;background:var(--surface2);border-radius:8px;
  padding:12px 14px;border:1px solid var(--border);}
.copy-btn{margin-top:10px;background:none;border:1px solid rgba(74,158,240,.3);border-radius:7px;
  padding:6px 12px;color:#70b8ff;font-family:var(--font);font-size:.76rem;cursor:pointer;transition:background .15s;
  display:inline-flex;align-items:center;gap:6px;}
.copy-btn:hover{background:rgba(74,158,240,.1);}
.copy-btn.copied{color:var(--ok);border-color:rgba(58,200,122,.3);}

.result-footer{display:flex;gap:10px;flex-wrap:wrap;}
.action-btn{background:none;border:1px solid var(--border);border-radius:9px;padding:9px 16px;
  color:var(--text2);font-family:var(--font);font-size:.82rem;cursor:pointer;transition:all .15s;}
.action-btn:hover{color:var(--text);border-color:var(--text2);}
.action-btn.primary-btn{background:var(--accent);border-color:var(--accent);color:#1a0f00;font-weight:700;}
.action-btn.primary-btn:hover{background:#f0b050;}

@media(max-width:480px){
  body{padding:14px 10px 50px;}
  .card,.result-hero{padding:20px 16px 18px;}

  .stlb-langtext{font-size:.72rem;}
}

// KEY BUILDER
// ═══════════════════════════════════════════════════════════════════════════════
function buildKey(){
  var b=answers.bereich||"";
  if(b==="dach"){
    return "dach|"+(answers.dachtyp||"")+("|")+(answers.dachsys||"");
  }
  if(b==="fahren"){
    return "fahren|"+(answers.sys18532||"");
  }
  if(b==="erde"){
    var eb=answers.erdbaut||"";
    if(eb==="wand"||eb==="sohle") return "erde|"+eb+"|"+(answers.wasser||"");
    if(eb==="sockel")             return "erde|sockel|"+(answers.sockel||"");
    if(eb==="durchdringung")      return "erde|durchdringung|"+(answers.dg||"");
  }
  if(b==="innen"){
    return "innen|"+(answers.bkl||"")+("|")+(answers.innensys||"");
  }
  if(b==="behaelter"){
    return "behaelter|"+(answers.beh||"")+("|")+(answers.behsys||"");
  }
  return "";
}

// ═══════════════════════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════════════════════
function chooseOption(idx){
  var step=TREE[currentStep], opt=step.options[idx];
  if(opt.key&&opt.ans!==undefined&&opt.ans!==null) answers[opt.key]=opt.ans;
  navStack.push({stepKey:currentStep,answers:JSON.parse(JSON.stringify(answers)),crumb:opt.label});
  currentStep=opt.next;
  render();
}
function goBack(){
  if(navStack.length===0) return;
  var prev=navStack.pop();
  currentStep=prev.stepKey; answers=prev.answers;
  render();
}
function resetAll(){navStack=[];answers={};currentStep="start";render();}
function toggleCheck(i){
  var box=document.getElementById("cb"+i),lbl=document.getElementById("cl"+i);
  var on=box.classList.toggle("checked");
  if(on)lbl.classList.add("checked");else lbl.classList.remove("checked");
}
function toggleStlb(){
  var b=document.getElementById("stlbBody"),t=document.getElementById("stlbToggle");
  var open=b.style.display!=="none";
  b.style.display=open?"none":"block";
  t.textContent=open?"▼ Anzeigen":"▲ Ausblenden";
}
function togglePos(i){
  var d=document.getElementById("sd"+i),a=document.getElementById("sa"+i);
  var open=d.classList.contains("open");
  d.classList.toggle("open",!open); a.classList.toggle("open",!open);
}
function copyText(i){
  var ta=document.getElementById("st"+i),btn=document.getElementById("cb2_"+i);
  var txt=ta.textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(function(){
      btn.textContent="✓ Kopiert!";btn.classList.add("copied");
      setTimeout(function(){btn.textContent="📋 Text kopieren";btn.classList.remove("copied");},2000);
    });
  }else{
    var r=document.createRange();r.selectNodeContents(ta);
    var s=window.getSelection();s.removeAllRanges();s.addRange(r);
    document.execCommand("copy");s.removeAllRanges();
    btn.textContent="✓ Kopiert!";btn.classList.add("copied");
    setTimeout(function(){btn.textContent="📋 Text kopieren";btn.classList.remove("copied");},2000);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════════════
function setProgress(pct,label){
  document.getElementById("progressFill").style.width=pct+"%";
  document.getElementById("progressLabel").textContent=label;
  document.getElementById("progressPct").textContent=pct+" %";
}
function renderBreadcrumb(){
  var out="";
  for(var i=0;i<navStack.length;i++){
    out+='<span class="crumb">'+navStack[i].crumb+'</span>';
    if(i<navStack.length-1)out+='<span class="crumb-arrow">›</span>';
  }
  document.getElementById("breadcrumb").innerHTML=out;
}
function render(){
  renderBreadcrumb();
  if(currentStep==="result"){renderResult();return;}
  var step=TREE[currentStep];
  if(!step){
    document.getElementById("app").innerHTML='<div class="card"><p style="color:var(--muted)">Unbekannter Schritt: '+currentStep+'</p><div class="back-row"><button class="back-btn" onclick="resetAll()">Neu starten</button></div></div>';
    return;
  }
  setProgress(step.progress,step.step);
  var opts="";
  for(var i=0;i<step.options.length;i++){
    var o=step.options[i];
    var normBadge=o.norm?'<span class="opt-norm '+o.norm+'">'+o.normtxt+'</span>':"";
    opts+='<button class="opt-btn" onclick="chooseOption('+i+')">'+
      '<span class="opt-icon">'+o.icon+'</span>'+
      '<span class="opt-text"><span class="opt-label">'+o.label+'</span>'+
      (o.desc?'<span class="opt-desc">'+o.desc+'</span>':'')+
      normBadge+'</span></button>';
  }
  var back=navStack.length>0?'<div class="back-row"><button class="back-btn" onclick="goBack()">← Zurück</button></div>':"";
  document.getElementById("app").innerHTML=
    '<div class="card">'+
      '<div class="step-chip"><span class="step-dot"></span>'+step.step+'</div>'+
      '<div class="question">'+step.question+'</div>'+
      (step.hint?'<div class="hint">'+step.hint+'</div>':'<div style="margin-bottom:16px"></div>')+
      '<div class="options">'+opts+'</div>'+back+
    '</div>';
}

function renderResult(){
  setProgress(100,"Ergebnis");
  var key=buildKey();
  var r=RESULTS[key];
  if(!r){
    document.getElementById("app").innerHTML=
      '<div class="card"><p style="color:var(--muted)">Kombination nicht erkannt.<br><small>Key: '+key+'</small></p>'+
      '<div class="back-row"><button class="back-btn" onclick="goBack()">← Zurück</button>&nbsp;<button class="back-btn" onclick="resetAll()">Neu starten</button></div></div>';
    return;
  }
  var warns="";
  for(var i=0;i<r.warnungen.length;i++)
    warns+='<div class="warn-box"><span>⚠️</span><span>'+r.warnungen[i]+'</span></div>';
  if(warns)warns='<div class="warn-list">'+warns+'</div>';

  var sys="";
  for(var i=0;i<r.systeme.length;i++){
    var s=r.systeme[i];
    sys+='<div class="sys-item '+(s.prim?"prim":"alt")+'">'+
      '<span class="sys-tag">'+(s.prim?"Empfohlen":"Alternativ")+'</span>'+
      '<div><div class="sys-name">'+s.name+'</div><div class="sys-note">'+s.note+'</div></div></div>';
  }
  var chk="";
  for(var i=0;i<r.checks.length;i++)
    chk+='<div class="check-item">'+
      '<div class="check-box" id="cb'+i+'" onclick="toggleCheck('+i+')"></div>'+
      '<span class="check-label" id="cl'+i+'" onclick="toggleCheck('+i+')">'+r.checks[i]+'</span></div>';

  var stlbPos=STLB[key]||[];
  var stlbHtml="";
  if(stlbPos.length>0){
    var posHtml="";
    for(var i=0;i<stlbPos.length;i++){
      var p=stlbPos[i];
      posHtml+='<div class="stlb-pos">'+
        '<div class="stlb-pos-head" onclick="togglePos('+i+')">'+
          '<span class="stlb-nr">'+p.nr+'</span>'+
          '<span class="stlb-kurz">'+p.kurz+'</span>'+
          '<span class="stlb-arrow" id="sa'+i+'">›</span>'+
        '</div>'+
        '<div class="stlb-detail" id="sd'+i+'">'+
          '<pre class="stlb-langtext" id="st'+i+'">'+p.lang+'</pre>'+
          '<button class="copy-btn" id="cb2_'+i+'" onclick="copyText('+i+')">📋 Text kopieren</button>'+
        '</div></div>';
    }
    stlbHtml='<div class="stlb-block">'+
      '<div class="stlb-head" onclick="toggleStlb()">'+
        '<div style="display:flex;align-items:center;gap:8px"><span>📄 Ausschreibungstext</span>'+
        '<span class="stlb-badge">StLB-Bau orientiert</span></div>'+
        '<span class="stlb-toggle" id="stlbToggle">▼ Anzeigen</span>'+
      '</div>'+
      '<div id="stlbBody" style="display:none">'+posHtml+'</div></div>';
  }

  document.getElementById("app").innerHTML=
    '<div class="result-wrap">'+
      '<div class="result-hero">'+
        '<div class="badge '+r.badge+'">'+r.klasse+'</div>'+
        '<div class="result-title">'+r.title+'</div>'+
        '<div class="result-subtitle">'+r.subtitle+'</div>'+
      '</div>'+
      warns+
      '<div class="section-block"><div class="section-head">Abdichtungssystem</div>'+
        '<div class="section-body">'+sys+'</div></div>'+
      '<div class="section-block"><div class="section-head">Ausführungs-Checkliste (Bauleiter)</div>'+
        '<div class="section-body check-list">'+chk+'</div>'+
        '<div class="norm-row"><span>📖</span>'+r.norm+'</div></div>'+
      stlbHtml+
      '<div class="result-footer">'+
        '<button class="back-btn" onclick="goBack()">← Zurück</button>'+
        '<button class="action-btn primary-btn" onclick="resetAll()">↩ Neue Abfrage</button>'+
      '</div>'+
    '</div>';
}
render();
</script>
