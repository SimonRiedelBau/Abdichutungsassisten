<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdichtungsassistent · DIN 18533</title>
<style>
  :root {
    --bg: #1a1c22;
    --surface: #22252e;
    --surface2: #2c3040;
    --border: #3a3f52;
    --accent: #e8a23a;
    --accent2: #3a8fe8;
    --ok: #3ac87a;
    --warn: #e8a23a;
    --danger: #e84a3a;
    --text: #e8eaf0;
    --muted: #8892a8;
    --font: 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  header {
    width: 100%;
    max-width: 680px;
    margin-bottom: 32px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .subtitle {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-left: 52px;
  }

  /* Progress bar */
  .progress-bar {
    width: 100%;
    max-width: 680px;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* Card */
  .card {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .step-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 10px;
  }

  .question {
    font-size: 1.2rem;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 8px;
  }

  .hint {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.5;
  }

  /* Option buttons */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-family: var(--font);
    font-size: 0.95rem;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option-btn:hover {
    border-color: var(--accent);
    background: #2a2d38;
    transform: translateX(3px);
  }

  .option-btn .icon {
    font-size: 1.1rem;
    flex-shrink: 0;
    width: 28px;
    text-align: center;
  }

  .option-btn .label {
    font-weight: 600;
    display: block;
  }

  .option-btn .desc {
    font-size: 0.78rem;
    color: var(--muted);
    display: block;
    margin-top: 2px;
  }

  /* Result */
  .result-card {
    background: var(--surface);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeIn 0.3s ease;
    width: 100%;
    max-width: 680px;
  }

  .result-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
  }

  .wassereinwirkung-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .badge-low  { background: rgba(58,200,122,0.15); color: var(--ok); border: 1px solid rgba(58,200,122,0.3); }
  .badge-mid  { background: rgba(232,162,58,0.15); color: var(--warn); border: 1px solid rgba(232,162,58,0.3); }
  .badge-high { background: rgba(232,74,58,0.15); color: var(--danger); border: 1px solid rgba(232,74,58,0.3); }

  .result-title {
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1.3;
  }

  .result-body {
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .result-section h3 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 700;
  }

  .system-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .system-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface2);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
  }

  .system-item.primary { border-left-color: var(--ok); }
  .system-item.alt     { border-left-color: var(--accent2); }

  .system-item .sys-tag {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(58,143,232,0.15);
    color: var(--accent2);
    white-space: nowrap;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .system-item.primary .sys-tag {
    background: rgba(58,200,122,0.15);
    color: var(--ok);
  }

  .system-item .sys-name {
    font-weight: 600;
    font-size: 0.92rem;
  }

  .system-item .sys-note {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .checklist {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .check-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.88rem;
    color: var(--muted);
  }

  .check-item::before {
    content: "☐";
    color: var(--accent);
    font-size: 1rem;
    flex-shrink: 0;
  }

  .warn-box {
    background: rgba(232,74,58,0.1);
    border: 1px solid rgba(232,74,58,0.25);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 0.85rem;
    color: #f0a0a0;
    line-height: 1.5;
    display: flex;
    gap: 10px;
  }

  .norm-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  /* Breadcrumb */
  .breadcrumb {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    width: 100%;
    max-width: 680px;
  }

  .crumb {
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
  }

  .crumb.active {
    color: var(--accent);
    border-color: rgba(232,162,58,0.3);
    background: rgba(232,162,58,0.08);
  }

  /* Reset */
  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    color: var(--muted);
    font-family: var(--font);
    font-size: 0.85rem;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.15s;
  }

  .reset-btn:hover {
    color: var(--text);
    border-color: var(--text);
  }

  .result-footer {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: gap;
    gap: 12px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 4px 0;
  }
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <div class="logo-icon">🧱</div>
    <h1>Abdichtungsassistent</h1>
  </div>
  <div class="subtitle">DIN 18533 · Systemwahl per Klick</div>
</header>

<div class="progress-bar">
  <div class="progress-fill" id="progress" style="width: 0%"></div>
</div>

<div class="breadcrumb" id="breadcrumb"></div>

<div id="app"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let state = {
  bauteil: null,
  wasser: null,
  druck: null,
};

let history = [];

// ─── Decision tree ────────────────────────────────────────────────────────────
const STEPS = {

    label: "Schritt 1 · Bauteil",

  s_sockel: {

  const key = `${bauteil}:${wasser}`;
  return results[key] || null;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render(stepKey) {
  const app = document.getElementById('app');
  const bc  = document.getElementById('breadcrumb');
  const prog = document.getElementById('progress');

  // Result?
  if (stepKey === 'result') {
    const r = getResult();
    if (!r) {
      app.innerHTML = `<div class="card"><p>Kombination nicht gefunden. Bitte erneut starten.</p><br><button class="reset-btn" onclick="reset()">↩ Neu starten</button></div>`;
      return;
    }

    prog.style.width = '100%';

    const warnsHtml = r.warnungen.length
      ? r.warnungen.map(w => `<div class="warn-box"><span>⚠️</span><span>${w}</span></div>`).join('')
      : '';

    const systemsHtml = r.systeme.map(s => `
      <div class="system-item ${s.primary ? 'primary' : 'alt'}">
        <span class="sys-tag">${s.primary ? 'Empfohlen' : 'Alternativ'}</span>
        <div>
          <div class="sys-name">${s.name}</div>
          <div class="sys-note">${s.note}</div>
        </div>
      </div>`).join('');

    const checksHtml = r.checks.map(c => `<div class="check-item">${c}</div>`).join('');

    app.innerHTML = `
      <div class="result-card">
        <div class="result-header">
          <div class="wassereinwirkung-badge ${r.badge}">${r.klasse}</div>
          <div class="result-title">${r.title}</div>
        </div>
        <div class="result-body">
          ${warnsHtml}
          <div class="result-section">
            <h3>Abdichtungssystem</h3>
            <div class="system-list">${systemsHtml}</div>
          </div>
          <hr class="divider">
          <div class="result-section">
            <h3>Ausführungs-Checkliste (Bauleiter)</h3>
            <div class="checklist">${checksHtml}</div>
          </div>
          <div class="norm-tag">📖 ${r.norm}</div>
        </div>
        <div class="result-footer">
          <button class="reset-btn" onclick="reset()">↩ Neu starten</button>
          <button class="reset-btn" onclick="goBack()">← Zurück</button>
        </div>
      </div>
    `;

    bc.innerHTML = history.map((h, i) =>
      `<span class="crumb ${i === history.length - 1 ? 'active' : ''}">${h}</span>`
    ).join('→ ');

    return;
  }

  // Question step
  const step = STEPS[stepKey];
  if (!step) return;

  prog.style.width = step.progress + '%';

  const optHtml = step.options.map(opt => `
    <button class="option-btn" onclick="choose(${JSON.stringify(opt)})">
      <span class="icon">${opt.icon}</span>
      <span>
        <span class="label">${opt.label}</span>
        ${opt.desc ? `<span class="desc">${opt.desc}</span>` : ''}
      </span>
    </button>
  `).join('');

  app.innerHTML = `
    <div class="card">
      <div class="step-label">${step.label}</div>
      <div class="question">${step.question}</div>
      ${step.hint ? `<div class="hint">${step.hint}</div>` : ''}
      <div class="options">${optHtml}</div>
      ${history.length > 0 ? `<div style="margin-top:20px"><button class="reset-btn" onclick="goBack()">← Zurück</button></div>` : ''}
    </div>
  `;

  bc.innerHTML = history.map((h, i) =>
    `<span class="crumb">${h}</span>`
  ).join(' → ');
}

// ─── Actions ─────────────────────────────────────────────────────────────────
function choose(opt) {
  // Save state
  Object.assign(state, opt.set || {});
  history.push(opt.label);
  render(opt.next);
}

function reset() {
  state = { bauteil: null, wasser: null, druck: null };
  history = [];
  render('start');
}

function goBack() {
  history.pop();
  // Simple back: re-derive step from state
  if (history.length === 0) {
    state = { bauteil: null, wasser: null, druck: null };
    render('start');
  } else {
    // Determine which step to go back to
    if (!state.wasser) {
      state.bauteil = null;
      render('start');
    } else {
      state.wasser = null;
      // Which second step?
      const btToStep = { wand: 's_wasser', sohle: 's_wasser', tg: 's_tg', sockel: 's_sockel', durchdringung: 's_durchdringung' };
      render(btToStep[state.bauteil] || 's_wasser');
    }
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
render('start');
</script>
