<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abdichtungsassistent · DIN 18533</title>
<style>
  :root {
    --bg: #1a1c22;
    --surface: #22252e;
    --surface2: #2c3040;
    --border: #3a3f52;
    --accent: #e8a23a;
    --accent2: #3a8fe8;
    --ok: #3ac87a;
    --warn: #e8a23a;
    --danger: #e84a3a;
    --text: #e8eaf0;
    --muted: #8892a8;
    --font: 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  header {
    width: 100%;
    max-width: 680px;
    margin-bottom: 32px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }

  .subtitle {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-left: 52px;
  }

  /* Progress */
  .progress-bar {
    width: 100%; max-width: 680px; height: 4px;
    background: var(--surface2); border-radius: 2px;
    margin-bottom: 16px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 2px; transition: width 0.4s ease;
  }

  /* Breadcrumb */
  .breadcrumb {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 20px; width: 100%; max-width: 680px;
    min-height: 28px;
  }
  .crumb {
    font-size: 0.75rem; color: var(--muted);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px;
  }
  .crumb.active { color: var(--accent); border-color: rgba(232,162,58,0.35); background: rgba(232,162,58,0.08); }
  .crumb-arrow { color: var(--border); font-size: 0.75rem; line-height: 26px; }

  /* Card */
  .card {
    width: 100%; max-width: 680px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px;
    animation: fadeIn 0.22s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .step-label {
    font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--accent);
    font-weight: 700; margin-bottom: 10px;
  }

  .question { font-size: 1.2rem; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }

  .hint { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }

  .option-btn {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    cursor: pointer; text-align: left;
    color: var(--text); font-family: var(--font);
    font-size: 0.95rem; transition: all 0.15s ease;
    display: flex; align-items: center; gap: 12px;
  }
  .option-btn:hover { border-color: var(--accent); background: #2a2d38; transform: translateX(3px); }
  .option-btn .icon { font-size: 1.1rem; flex-shrink: 0; width: 28px; text-align: center; }
  .option-btn .label { font-weight: 600; display: block; }
  .option-btn .desc { font-size: 0.78rem; color: var(--muted); display: block; margin-top: 2px; }

  /* Result card */
  .result-card {
    background: var(--surface); border-radius: 16px;
    overflow: hidden; animation: fadeIn 0.3s ease;
    width: 100%; max-width: 680px;
    border: 1px solid var(--border);
  }

  .result-header { padding: 20px 28px; border-bottom: 1px solid var(--border); }

  .wassereinwirkung-badge {
    display: inline-block; padding: 4px 12px;
    border-radius: 20px; font-size: 0.75rem;
    font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .badge-low  { background: rgba(58,200,122,0.15); color: var(--ok);    border: 1px solid rgba(58,200,122,0.3); }
  .badge-mid  { background: rgba(232,162,58,0.15); color: var(--warn);  border: 1px solid rgba(232,162,58,0.3); }
  .badge-high { background: rgba(232,74,58,0.15);  color: var(--danger);border: 1px solid rgba(232,74,58,0.3); }

  .result-title { font-size: 1.4rem; font-weight: 700; line-height: 1.3; }

  .result-body { padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; }

  .result-section h3 {
    font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--muted);
    margin-bottom: 10px; font-weight: 700;
  }

  .system-list { display: flex; flex-direction: column; gap: 8px; }

  .system-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px 14px; background: var(--surface2);
    border-radius: 8px; border-left: 3px solid var(--accent);
  }
  .system-item.primary { border-left-color: var(--ok); }
  .system-item.alt     { border-left-color: var(--accent2); }

  .sys-tag {
    font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; padding: 2px 7px; border-radius: 4px;
    background: rgba(58,143,232,0.15); color: var(--accent2);
    white-space: nowrap; margin-top: 2px; flex-shrink: 0;
  }
  .system-item.primary .sys-tag { background: rgba(58,200,122,0.15); color: var(--ok); }
  .sys-name { font-weight: 600; font-size: 0.92rem; }
  .sys-note { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

  .checklist { display: flex; flex-direction: column; gap: 6px; }

  .check-item {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 0.88rem; color: var(--muted); cursor: pointer;
    padding: 4px 2px; border-radius: 4px; transition: color 0.15s;
    user-select: none;
  }
  .check-item:hover { color: var(--text); }
  .check-item .cb { flex-shrink: 0; margin-top: 1px; }
  .check-item input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
  .check-item.done { color: var(--ok); text-decoration: line-through; }

  .warn-box {
    background: rgba(232,74,58,0.1); border: 1px solid rgba(232,74,58,0.25);
    border-radius: 10px; padding: 14px 16px;
    font-size: 0.85rem; color: #f0a0a0; line-height: 1.5;
    display: flex; gap: 10px;
  }

  .norm-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.75rem; color: var(--muted);
    background: var(--surface2); padding: 4px 10px;
    border-radius: 6px; border: 1px solid var(--border);
  }

  .result-footer {
    padding: 16px 28px; border-top: 1px solid var(--border);
    display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

  .reset-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 20px;
    color: var(--muted); font-family: var(--font);
    font-size: 0.85rem; cursor: pointer; transition: all 0.15s;
  }
  .reset-btn:hover { color: var(--text); border-color: var(--text); }

  .print-btn {
    background: var(--accent); border: none;
    border-radius: 8px; padding: 10px 20px;
    color: #1a1c22; font-family: var(--font);
    font-size: 0.85rem; font-weight: 700; cursor: pointer;
    transition: opacity 0.15s;
  }
  .print-btn:hover { opacity: 0.88; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

  /* Progress summary at top of result */
  .summary-bar {
    display: flex; gap: 8px; flex-wrap: wrap; padding: 0 28px 16px;
  }
  .summary-pill {
    font-size: 0.75rem; padding: 3px 10px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; color: var(--muted);
  }
  .summary-pill strong { color: var(--text); }

  /* Tooltip info */
  .info-box {
    background: rgba(58,143,232,0.08); border: 1px solid rgba(58,143,232,0.2);
    border-radius: 10px; padding: 14px 16px;
    font-size: 0.83rem; color: #a0c4f0; line-height: 1.6;
  }

  /* Print styles */
  @media print {
    body { background: #fff; color: #000; padding: 0; }
    .result-footer, .breadcrumb, .progress-bar, header .subtitle { display: none; }
    .result-card { border: none; }
    .result-header, .result-body { padding: 12px 0; }
    .system-item, .warn-box, .info-box { border: 1px solid #ccc !important; background: #f9f9f9 !important; color: #000 !important; }
    .sys-tag, .wassereinwirkung-badge { border: 1px solid #ccc !important; color: #000 !important; background: #eee !important; }
    .result-title, h1, .step-label { color: #000 !important; }
    .sys-name, .sys-note, .check-item, .muted { color: #444 !important; }
    h3 { color: #666 !important; }
    .norm-tag { border: 1px solid #ccc; background: #f0f0f0; color: #444; }
    .print-btn { display: none; }
    .check-item { text-decoration: none !important; color: #000 !important; }
    .check-item.done { color: #000 !important; text-decoration: none !important; }
  }

  @media (max-width: 500px) {
    .card, .result-card { padding: 18px 16px; }
    .result-header, .result-body, .result-footer { padding-left: 16px; padding-right: 16px; }
    h1 { font-size: 1.2rem; }
    .question { font-size: 1.05rem; }
  }
</style>
</head>
<body>

<header>

<div class="breadcrumb" id="breadcrumb"></div>

<div id="app"></div>

// ─── Helpers ──────────────────────────────────────────────────────────────────
const BAUTEIL_LABELS = {
  wand: "Wand (erdberührt)", sohle: "Bodenplatte / Sohle",
  tg: "TG-Decke / Außendecke", sockel: "Sockel / Spritzwasserzone",
  durchdringung: "Durchdringung / Anschluss",
};

function getResult() {
  const key = `${state.bauteil}:${state.wasser}`;
  return RESULTS[key] || null;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderBreadcrumb(currentLabel) {
  const bc = document.getElementById('breadcrumb');
  const items = navStack.map(e => e.label);
  if (currentLabel) items.push(currentLabel);

  if (items.length === 0) { bc.innerHTML = ''; return; }

  bc.innerHTML = items.map((lbl, i) => {
    const isLast = i === items.length - 1;
    return (i > 0 ? '<span class="crumb-arrow">›</span>' : '') +
      `<span class="crumb${isLast ? ' active' : ''}">${lbl}</span>`;
  }).join('');
}

function renderStep(stepKey) {
  const app = document.getElementById('app');
  const prog = document.getElementById('progress');

  if (stepKey === 'result') {
    const r = getResult();
    if (!r) {
      app.innerHTML = `<div class="card">
        <p style="color:var(--muted)">Kombination nicht gefunden. Bitte neu starten.</p>
        <br><button class="reset-btn" onclick="reset()">↩ Neu starten</button>
      </div>`;
      return;
    }

    prog.style.width = '100%';
    renderBreadcrumb(null);

    const warnsHtml = r.warnungen.map(w =>
      `<div class="warn-box"><span>⚠️</span><span>${w}</span></div>`
    ).join('');

    const systemsHtml = r.systeme.map(s => `
      <div class="system-item ${s.primary ? 'primary' : 'alt'}">
        <span class="sys-tag">${s.primary ? 'Empfohlen' : 'Alternativ'}</span>
        <div>
          <div class="sys-name">${s.name}</div>
          <div class="sys-note">${s.note}</div>
        </div>
      </div>`).join('');

    const checksHtml = r.checks.map((c, i) => `
      <label class="check-item" id="ci${i}">
        <span class="cb"><input type="checkbox" onchange="toggleCheck(${i})"></span>
        <span>${c}</span>
      </label>`).join('');

    const summaryPills = [
      state.bauteil ? `<span class="summary-pill">Bauteil: <strong>${BAUTEIL_LABELS[state.bauteil]}</strong></span>` : '',
      state.wasser  ? `<span class="summary-pill">Klasse: <strong>${r.klasse}</strong></span>` : '',
    ].join('');

    app.innerHTML = `
      <div class="result-card">
        <div class="result-header">
          <div class="wassereinwirkung-badge ${r.badge}">${r.klasse}</div>
          <div class="result-title">${r.title}</div>
        </div>
        <div class="summary-bar">${summaryPills}</div>
        <div class="result-body">
          <div class="info-box">ℹ️ ${r.info}</div>
          ${warnsHtml}
          <div class="result-section">
            <h3>Abdichtungssystem</h3>
            <div class="system-list">${systemsHtml}</div>
          </div>
          <hr class="divider">
          <div class="result-section">
            <h3>Ausführungs-Checkliste (anklicken zum Abhaken)</h3>
            <div class="checklist" id="checklist">${checksHtml}</div>
          </div>
          <div class="norm-tag">📖 ${r.norm}</div>
        </div>
        <div class="result-footer">
          <div class="btn-row">
            <button class="reset-btn" onclick="goBack()">← Zurück</button>
            <button class="reset-btn" onclick="reset()">↩ Neu starten</button>
          </div>
          <button class="print-btn" onclick="window.print()">🖨️ Drucken / PDF</button>
        </div>
      </div>
    `;
    return;
  }

  const step = STEPS[stepKey];
  if (!step) return;

  prog.style.width = step.progress + '%';
  renderBreadcrumb(step.label);

  const optHtml = step.options.map(opt => `
    <button class="option-btn" onclick="choose(${JSON.stringify(opt).replace(/"/g, '&quot;')}, '${stepKey}', '${step.label}')">
      <span class="icon">${opt.icon}</span>
      <span>
        <span class="label">${opt.label}</span>
        ${opt.desc ? `<span class="desc">${opt.desc}</span>` : ''}
      </span>
    </button>
  `).join('');

  app.innerHTML = `
    <div class="card">
      <div class="step-label">${step.label}</div>
      <div class="question">${step.question}</div>
      ${step.hint ? `<div class="hint">${step.hint}</div>` : ''}
      <div class="options">${optHtml}</div>
      ${navStack.length > 0 ? `<div style="margin-top:20px"><button class="reset-btn" onclick="goBack()">← Zurück</button></div>` : ''}
    </div>
  `;
}

// ─── Actions ─────────────────────────────────────────────────────────────────
function choose(opt, fromStepKey, fromStepLabel) {
  // Push current position to nav stack
  navStack.push({
    stepKey: fromStepKey,
    label: fromStepLabel,
    stateBefore: { ...state },
  });

  // Apply state changes
  if (opt.set) Object.assign(state, opt.set);

  renderStep(opt.next);
}

function goBack() {
  if (navStack.length === 0) return;
  const prev = navStack.pop();
  state = { ...prev.stateBefore };
  renderStep(prev.stepKey);
}

function reset() {
  state = { bauteil: null, wasser: null };
  navStack = [];
  renderStep('start');
}

function toggleCheck(idx) {
  const el = document.getElementById('ci' + idx);
  if (el) el.classList.toggle('done');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderStep('start');
</script>
